name: pr-auto-label

on:
    pull_request_target:
        types: [opened, edited, synchronize]

permissions:
    pull-requests: write
    contents: none

jobs:
    label:
        runs-on: ubuntu-latest
        timeout-minutes: 2

        steps:
            - uses: actions/github-script@v7
              with:
                  script: |
                      const match = context.payload.pull_request.title.match(/^(\w+)(\([^)]+\))?(!)?:/);
                      if (!match) {
                          core.info('PR title is not conventional commit format, skipping');
                          return;
                      }
                      const [, type, , breaking] = match;
                      const labels = [type];
                      if (breaking) labels.push('breaking');
                      await github.rest.issues.addLabels({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.payload.pull_request.number,
                          labels,
                      });
                      core.info(`Applied: ${labels.join(', ')}`);
