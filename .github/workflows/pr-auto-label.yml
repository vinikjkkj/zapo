name: pr-auto-label

on:
    pull_request_target:
        types: [opened, edited, reopened]

permissions:
    pull-requests: write
    contents: none

jobs:
    label:
        runs-on: ubuntu-latest
        timeout-minutes: 2

        steps:
            - uses: actions/github-script@v7
              with:
                  script: |
                      const TYPES = ['feat', 'fix', 'perf', 'refactor', 'docs', 'test', 'chore', 'build', 'ci', 'style', 'deps', 'revert'];

                      const match = context.payload.pull_request.title.match(/^(\w+)(\([^)]+\))?(!)?:/);
                      if (!match) {
                          core.info('PR title is not conventional commit format, skipping');
                          return;
                      }
                      const [, type, , breaking] = match;

                      if (!TYPES.includes(type)) {
                          core.info(`Type '${type}' not in allow-list, skipping`);
                          return;
                      }

                      const { data: current } = await github.rest.issues.listLabelsOnIssue({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.payload.pull_request.number,
                      });

                      const preserved = current
                          .map(l => l.name)
                          .filter(name => !TYPES.includes(name) && name !== 'breaking');

                      const next = [type];
                      if (breaking) next.push('breaking');

                      await github.rest.issues.setLabels({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.payload.pull_request.number,
                          labels: [...preserved, ...next],
                      });
                      core.info(`Applied: ${next.join(', ')}`);
