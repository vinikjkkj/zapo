name: pr-validate-title

on:
    pull_request_target:
        types: [opened, edited, reopened]

permissions:
    pull-requests: write
    issues: write

jobs:
    title:
        runs-on: ubuntu-latest
        timeout-minutes: 2

        steps:
            - uses: amannn/action-semantic-pull-request@v5
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  types: |
                      feat
                      fix
                      perf
                      refactor
                      docs
                      test
                      chore
                      build
                      ci
                      style
                      deps
                      revert
