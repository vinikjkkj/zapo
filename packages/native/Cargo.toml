[package]
name = "zapo-native"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Native accelerators for zapo-js"

[lib]
name = "zapo_native"
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", default-features = false, features = ["napi9"] }
napi-derive = "3"
curve25519-dalek = { version = "4", default-features = false, features = ["alloc", "precomputed-tables", "zeroize"] }
sha2 = { version = "0.10", default-features = false }
getrandom = "0.2"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
opt-level = 3
codegen-units = 1
strip = "symbols"
